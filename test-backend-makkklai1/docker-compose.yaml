services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-booking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking}
      POSTGRES_DB: ${POSTGRES_DB:-booking}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://booking:booking@db:5432/booking?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
